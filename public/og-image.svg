<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f7ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6355e3"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#6355e3" stroke-width="0.5" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo -->
  <rect x="80" y="200" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="120" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white">Ω</text>
  <!-- Title -->
  <text x="190" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0f1729" letter-spacing="-1">OmegaAPI</text>
  <!-- Subtitle -->
  <text x="190" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#4a5068" font-weight="500">Free Manga &amp; Manhwa REST API</text>
  <!-- Tags -->
  <rect x="80" y="340" width="120" height="32" rx="8" fill="#ede9fe"/>
  <text x="140" y="361" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6355e3" text-transform="uppercase">Free API</text>
  <rect x="210" y="340" width="140" height="32" rx="8" fill="#ecfeff"/>
  <text x="280" y="361" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0891b2">No Auth</text>
  <rect x="360" y="340" width="160" height="32" rx="8" fill="#ecfdf5"/>
  <text x="440" y="361" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#059669">CORS Ready</text>
  <!-- URL -->
  <text x="80" y="440" font-family="'JetBrains Mono', monospace" font-size="18" fill="#8890a8">https://omegaapi.vercel.app</text>
  <!-- Decorative dots -->
  <circle cx="1050" cy="100" r="120" fill="#6355e3" opacity="0.06"/>
  <circle cx="1100" cy="550" r="80" fill="#0891b2" opacity="0.06"/>
  <circle cx="900" cy="500" r="60" fill="#8b5cf6" opacity="0.05"/>
</svg>
